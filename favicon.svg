<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <defs>
        <style>
            .glass { fill: #d6ac7a; }
            .wine { fill: #ec5748; }
        </style>
    </defs>

    <!-- Fond sombre pour contraste -->
    <rect width="100" height="100" fill="#0f1419" rx="20"/>

    <!-- Forme simplifiée du verre -->
    <path class="glass" d="M25,20 Q25,15 30,15 L70,15 Q75,15 75,20 L75,25 Q75,40 65,55 L65,85 Q65,90 60,90 L40,90 Q35,90 35,85 L35,55 Q25,40 25,25 Z"/>

    <!-- Vin rouge -->
    <ellipse class="wine" cx="50" cy="30" rx="22" ry="8"/>
    <path class="wine" d="M28,30 Q28,40 38,48 L38,52 L62,52 L62,48 Q72,40 72,30 Z"/>

    <!-- Pied du verre -->
    <ellipse class="glass" cx="50" cy="90" rx="15" ry="3"/>
</svg>
